<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DP NEWS — Quadro de Avisos</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23FFCC00'/%3E%3Ctext x='16' y='22' font-family='Arial Black%2C Arial' font-weight='900' font-size='15' fill='%23000000' text-anchor='middle'%3EDP%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuTy/Sz0ckk9Llg6A0k7My1p8VF9GjApM1jFJKC3E0iNUxjH0mnZFjdJwO57SBOVT2em4A0YzQxZj2g==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root {
      --primary:    #000000;
      --accent:     #FFCC00;
      --success:    #28a745;
      --danger:     #dc3545;
      --bg:         #f5f5f5;
      --card-bg:    #ffffff;
      --text:       #1a1a1a;
      --text-muted: #666666;
      --border:     #e0e0e0;
      --transition: .22s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px;
    }

    /* Cabeçalho */
    .board-header {
      width: 100%; max-width: 860px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .board-brand { display: flex; align-items: center; gap: 14px; }
    .board-brand-icon {
      width: 48px; height: 48px; background: var(--accent);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #000; flex-shrink: 0;
    }
    .board-brand-text h1 { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
    .board-brand-text p  { font-size: .78rem; color: var(--text-muted); margin: 0; }
    .board-clock { font-size: .82rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

    /* Quadro */
    .board {
      width: 100%; max-width: 860px;
      background: var(--card-bg); border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.10); border: 1px solid var(--border); overflow: hidden;
    }
    .board-title-bar {
      background: var(--accent); padding: 18px 26px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .board-title-bar h2 { color: #000; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .board-count { background: rgba(0,0,0,.12); color: #000; font-size: .72rem; font-weight: 700; padding: 3px 11px; border-radius: 20px; white-space: nowrap; }

    /* Lista */
    .board-list { padding: 10px 0; }
    .board-item {
      padding: 20px 26px; border-bottom: 1px solid var(--border);
      display: flex; gap: 18px; align-items: flex-start;
      transition: background var(--transition);
      animation: fadeSlideIn .3s ease both;
    }
    .board-item:last-child { border-bottom: none; }
    .board-item:hover { background: rgba(0,0,0,.02); }
    .board-item-urgente { background: rgba(220,53,69,.04); border-left: 4px solid #dc3545; }
    .board-item-urgente:hover { background: rgba(220,53,69,.07); }
    .board-item-pin { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 7px; }
    .board-item-body { flex: 1; }
    .board-item-title { font-size: .97rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; line-height: 1.4; }
    .board-item-desc  { font-size: .875rem; color: var(--text); line-height: 1.65; }
    .board-item-date  { font-size: .75rem; color: var(--text-muted); margin-top: 10px; display: flex; align-items: center; gap: 5px; }

    /* Vazio / Erro / Loading */
    .board-empty { padding: 70px 20px; text-align: center; }
    .board-empty-icon { width: 68px; height: 68px; border-radius: 50%; background: rgba(255,204,0,.15); display: flex; align-items: center; justify-content: center; font-size: 1.9rem; color: #000; margin: 0 auto 16px; }
    .board-empty-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .board-empty-desc  { font-size: .84rem; color: var(--text-muted); }
    .loading-spinner { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: var(--text-muted); font-size: .9rem; }
    .loading-spinner i { animation: spin 1s linear infinite; font-size: 1.4rem; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #c0c8d4; border-radius: 4px; }

    @media (max-width: 600px) {
      body { padding: 20px 12px 40px; }
      .board-title-bar { padding: 14px 16px; }
      .board-item { padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="board-header">
    <div class="board-brand">
      <div class="board-brand-icon"><i class="fa-solid fa-bullhorn"></i></div>
      <div class="board-brand-text">
        <h1>DP NEWS</h1>
        <p>Quadro de Avisos Oficial</p>
      </div>
    </div>
    <span class="board-clock">
      <i class="fa-regular fa-clock"></i>
      <span id="boardClock">—</span>
    </span>
  </div>

  <div class="board">
    <div class="board-title-bar">
      <h2><i class="fa-solid fa-thumbtack"></i> Avisos</h2>
      <span class="board-count" id="totalAvisos">—</span>
    </div>
    <div class="board-list" id="avisosContainer">
      <div class="loading-spinner">
        <i class="fa-solid fa-circle-notch"></i> Carregando avisos...
      </div>
    </div>
  </div>

  <script>
    const API = 'api.php';

    function esc(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    function isExpirado(a) {
      if (!a.dataValidade) return false;
      const hora   = a.horaValidade || '23:59';
      const expira = new Date(`${a.dataValidade}T${hora}:00`);
      return new Date() > expira;
    }

    function formatarData(s) {
      if (!s) return '—';
      const [y, m, d] = s.split('-'); return `${d}/${m}/${y}`;
    }

    async function renderAvisosPublic() {
      const container = document.getElementById('avisosContainer');
      const countEl   = document.getElementById('totalAvisos');

      try {
        const resp  = await fetch(`${API}?action=list`);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const todos = await resp.json();

        // Filtra expirados e ordena: urgentes primeiro, depois data desc
        const avisos = todos
          .filter(a => !isExpirado(a))
          .sort((a, b) => {
            if (a.urgente !== b.urgente) return a.urgente ? -1 : 1;
            return new Date(b.data) - new Date(a.data);
          });

        if (countEl) countEl.textContent = avisos.length + ' aviso' + (avisos.length !== 1 ? 's' : '');

        if (avisos.length === 0) {
          container.innerHTML = `
            <div class="board-empty">
              <div class="board-empty-icon"><i class="fa-regular fa-bell-slash"></i></div>
              <div class="board-empty-title">Nenhum aviso no momento</div>
              <div class="board-empty-desc">Não há avisos publicados. Volte mais tarde.</div>
            </div>`;
          return;
        }

        container.innerHTML = avisos.map((a, i) => `
          <div class="board-item${a.urgente ? ' board-item-urgente' : ''}" style="animation-delay:${i * 0.06}s">
            <div class="board-item-pin" style="${a.urgente ? 'background:#dc3545' : ''}"></div>
            <div class="board-item-body">
              <div class="board-item-title">
                ${a.urgente ? `<span style="display:inline-flex;align-items:center;gap:5px;background:#dc3545;color:#fff;font-size:.68rem;font-weight:800;padding:2px 9px;border-radius:4px;margin-right:8px;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle"><i class="fa-solid fa-triangle-exclamation"></i> Urgente</span>` : ''}
                ${esc(a.titulo)}
              </div>
              <div class="board-item-desc">${a.descricao.replace(/\n/g, '<br>')}</div>
              <div class="board-item-date">
                <i class="fa-regular fa-calendar"></i> ${formatarData(a.data)}
              </div>
            </div>
          </div>`).join('');

      } catch (err) {
        console.error(err);
        if (countEl) countEl.textContent = 'erro';
        container.innerHTML = `
          <div class="board-empty">
            <div class="board-empty-icon"><i class="fa-solid fa-triangle-exclamation" style="color:#dc3545"></i></div>
            <div class="board-empty-title">Erro ao carregar avisos</div>
            <div class="board-empty-desc">Não foi possível conectar ao servidor. Tente recarregar a página.</div>
          </div>`;
      }
    }

    /* Relógio */
    function tick() {
      const el = document.getElementById('boardClock');
      if (!el) return;
      const n = new Date();
      el.textContent = n.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' })
                     + '  '
                     + n.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderAvisosPublic();
      tick();
      setInterval(tick, 1000);
      // Recarrega a cada 90 segundos para pegar novos avisos
      setTimeout(() => location.reload(), 90 * 1000);
    });
  </script>

</body>
</html>
