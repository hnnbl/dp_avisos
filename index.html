<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DP NEWS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23FFCC00'/%3E%3Ctext x='16' y='22' font-family='Arial Black,Arial' font-weight='900' font-size='15' fill='%23000' text-anchor='middle'%3EDP%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 14px 50px}
/* Cabeçalho */
.hdr{width:100%;max-width:800px;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:44px;height:44px;background:#FFCC00;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.brand-name{font-size:1.15rem;font-weight:900;color:#000}
.brand-sub{font-size:.75rem;color:#666}
.clock{font-size:.8rem;color:#666}
/* Quadro */
.board{width:100%;max-width:800px;background:#fff;border-radius:12px;box-shadow:0 3px 20px rgba(0,0,0,.10);overflow:hidden}
.board-bar{background:#FFCC00;padding:16px 22px;display:flex;align-items:center;justify-content:space-between}
.board-bar h2{font-size:.95rem;font-weight:800;color:#000}
.board-count{background:rgba(0,0,0,.15);color:#000;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
/* Itens */
.item{padding:18px 22px;border-bottom:1px solid #e8e8e8;display:flex;gap:14px;align-items:flex-start;transition:background .15s}
.item:last-child{border-bottom:none}
.item:hover{background:#fafafa}
.item-urg{background:#fff5f5;border-left:4px solid #dc3545}
.item-urg:hover{background:#ffefef}
.dot{width:9px;height:9px;border-radius:50%;background:#FFCC00;flex-shrink:0;margin-top:6px}
.dot-urg{background:#dc3545}
.item-body{flex:1}
.item-title{font-size:.93rem;font-weight:700;color:#000;margin-bottom:5px;line-height:1.4}
.item-desc{font-size:.855rem;color:#333;line-height:1.6}
.item-date{font-size:.73rem;color:#888;margin-top:8px}
.tag-urg{display:inline-flex;align-items:center;gap:4px;background:#dc3545;color:#fff;font-size:.63rem;font-weight:800;padding:2px 8px;border-radius:4px;margin-right:7px;letter-spacing:.4px;text-transform:uppercase;vertical-align:middle}
/* Vazio / Erro */
.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-title{font-size:.95rem;font-weight:700;color:#000;margin-bottom:5px}
.empty-desc{font-size:.82rem;color:#888}
/* Animação */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.item{animation:fadeUp .28s ease both}
/* Responsivo */
@media(max-width:540px){.item{padding:14px 14px}.board-bar{padding:13px 14px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">
    <div class="brand-icon">&#128226;</div>
    <div>
      <div class="brand-name">DP NEWS</div>
      <div class="brand-sub">Quadro de Avisos Oficial</div>
    </div>
  </div>
  <span class="clock" id="clock">—</span>
</div>

<div class="board">
  <div class="board-bar">
    <h2>&#128204; Avisos</h2>
    <span class="board-count" id="total">—</span>
  </div>
  <div id="lista"><div class="empty"><div class="empty-icon">&#8987;</div><div class="empty-title">Carregando...</div></div></div>
</div>

<script>
var API = 'api.php';

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function isExp(a){
  if(!a.dataValidade) return false;
  var h=a.horaValidade||'23:59';
  return new Date()>new Date(a.dataValidade+'T'+h+':00');
}

function fmtData(s){
  if(!s) return '—';
  var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}

function render(avisos){
  var el=document.getElementById('lista');
  var ct=document.getElementById('total');
  var ativos=avisos.filter(function(a){return !isExp(a);});
  ativos.sort(function(a,b){
    if(a.urgente!==b.urgente) return a.urgente?-1:1;
    return new Date(b.data)-new Date(a.data);
  });
  ct.textContent=ativos.length+' aviso'+(ativos.length!==1?'s':'');
  if(!ativos.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">&#128276;</div><div class="empty-title">Nenhum aviso no momento</div><div class="empty-desc">Volte mais tarde.</div></div>';
    return;
  }
  var html='';
  for(var i=0;i<ativos.length;i++){
    var a=ativos[i];
    var urg=a.urgente?'item-urg':'';
    var dot=a.urgente?'dot dot-urg':'dot';
    var tag=a.urgente?'<span class="tag-urg">&#9888; Urgente</span>':'';
    var desc=String(a.descricao||'').replace(/\n/g,'<br>');
    html+='<div class="item '+urg+'" style="animation-delay:'+(i*0.055)+'s">'
      +'<div class="'+dot+'"></div>'
      +'<div class="item-body">'
      +'<div class="item-title">'+tag+esc(a.titulo)+'</div>'
      +'<div class="item-desc">'+desc+'</div>'
      +'<div class="item-date">&#128197; '+fmtData(a.data)+'</div>'
      +'</div></div>';
  }
  el.innerHTML=html;
}

function carregar(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',API+'?action=list',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    if(xhr.status===200){
      try{ render(JSON.parse(xhr.responseText)); }
      catch(e){ mostrarErro('Resposta inválida do servidor.'); }
    } else {
      mostrarErro('Erro HTTP '+xhr.status);
    }
  };
  xhr.send();
}

function mostrarErro(msg){
  document.getElementById('lista').innerHTML='<div class="empty"><div class="empty-icon">&#9888;</div><div class="empty-title">Erro ao carregar</div><div class="empty-desc">'+esc(msg)+'</div></div>';
  document.getElementById('total').textContent='erro';
}

function tick(){
  var n=new Date();
  var d=('0'+n.getDate()).slice(-2)+'/'+('0'+(n.getMonth()+1)).slice(-2)+'/'+n.getFullYear();
  var h=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);
  document.getElementById('clock').textContent=d+'  '+h;
}

carregar();
tick();
setInterval(tick,1000);
setTimeout(function(){location.reload();},90000);
</script>
</body>
</html>
